<!DOCTYPE html>
<html <lang="en">
<head>
  <meta charset="UTF-8">
  <title>ASTA</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Comfortaa', sans-serif;
      height: 100vh;
      background: #c2a9ef;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 160px;
      min-width: 160px;
      background: linear-gradient(180deg, #9667e0, #c2a9ef);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 20px;
      gap: 12px;
    }
    .sidebar .avatar {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 4px 20px rgba(100,60,180,0.3);
    }
    .sidebar h2 {
      color: white;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .sidebar .status {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .online-dot {
      width: 7px;
      height: 7px;
      background: #a8ffb0;
      border-radius: 50%;
      display: inline-block;
    }
    .sidebar .tagline {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      margin-top: 8px;
      line-height: 1.6;
    }

    /* MAIN CHAT */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #eeeafd;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 24px;
      background: rgba(255,255,255,0.7);
      border-bottom: 1.5px solid #e2d4f7;
      font-size: 13px;
      color: #9667e0;
      font-weight: 700;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #d8caf6; border-radius: 10px; }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .message-row.user { flex-direction: row-reverse; }

    .bot-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #c2a9ef, #9667e0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .msg-wrap { display: flex; flex-direction: column; }
    .msg-wrap.user { align-items: flex-end; }

    .bubble {
      max-width: 60%;
      min-width: 80px;
      padding: 12px 18px;
      border-radius: 20px;
      font-size: 13px;
      line-height: 1.7;
      font-family: 'Comfortaa', sans-serif;
      word-wrap: break-word;

    }
    .bubble.bot {
      background: white;
      color: #5b3fa0;
      border-bottom-left-radius: 6px;
      border: 1.5px solid #e2d4f7;
    }
    .bubble.user {
      background: linear-gradient(135deg, #ac88e8, #9667e0);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .time {
      font-size: 10px;
      color: #b0a0cc;
      margin-top: 4px;
      padding: 0 4px;
    }
    .time.user { text-align: right; }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 2px;
    }
    .typing-dots span {
      width: 8px; height: 8px;
      background: #ac88e8;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* INPUT */
    .input-area {
      padding: 16px 32px;
      background: rgba(255,255,255,0.8);
      border-top: 1.5px solid #e2d4f7;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    input {
      flex: 1;
      padding: 14px 22px;
      border-radius: 10px;
      
    }
    input::placeholder { color: #c2a9ef; }
    input:focus { border-color: #ac88e8; }

    button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ac88e8, #9667e0);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      box-shadow: 0 4px 14px rgba(150,103,224,0.35);
      transition: transform 0.15s;
    }
    #mic-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ac88e8, #9667e0);
      border: none;
      cursor: pointer;
      font-size: 20px;
      box-shadow: 0 4px 14px rgba(150,103,224,0.35);
      transition: transform 0.15s;
    }
    #mic-btn:hover { transform: scale(1.08); }
    }
    button:hover { transform: scale(1.08); }
    button:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="avatar">🤖</div>
    <h2>ASTA</h2>
    <div class="status"><span class="online-dot"></span> Online</div>
    <div class="tagline">Smart Tech Assistant </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <div class="chat-header">💬 Chat with ASTA</div>

    <div class="messages" id="messages">
      <div class="message-row">
        <div class="bot-avatar">🤖</div>
        <div class="msg-wrap">
          <div class="bubble bot">Hey, What's on your mind?</div>
          <div class="time" id="init-time"></div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <button id="mic-btn" onclick="toggleMic()" title="Speak to ASTA">🎤</button>
      <input type="text" id="input" placeholder="Type or speak..." onkeypress="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const sessionId = "user_" + Math.random().toString(36).substr(2, 9);

    function getTime() {
      const now = new Date();
      return now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }

    document.getElementById("init-time").textContent = getTime();

    async function sendMessage() {
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const text = input.value.trim();
      if (!text) return;

      const userTime = getTime();
      messages.innerHTML += `
        <div class="message-row user">
          <div class="msg-wrap user">
            <div class="bubble user">${text}</div>
            <div class="time user">${userTime}</div>
          </div>
        </div>`;
      input.value = "";
      messages.scrollTop = messages.scrollHeight;

      messages.innerHTML += `
        <div class="message-row" id="typing">
          <div class="bot-avatar">🤖</div>
          <div class="bubble bot">
            <div class="typing-dots"><span></span><span></span><span></span></div>
          </div>
        </div>`;
      messages.scrollTop = messages.scrollHeight;

      try {
        const response = await fetch("https://llm-chatbot-asta-production.up.railway.app/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({session_id: sessionId, message: text})
        });
        const data = await response.json();
        document.getElementById("typing").remove();
        const botTime = getTime();
        messages.innerHTML += `
          <div class="message-row">
            <div class="bot-avatar">🤖</div>
            <div class="msg-wrap">
              <div class="bubble bot">${formatReply(data.reply)}</div>
              <div class="time">${botTime}</div>
            </div>
          </div>`;
        speak(data.reply);
        messages.scrollTop = messages.scrollHeight;
      } catch(e) {
        document.getElementById("typing").remove();
        messages.innerHTML += `
          <div class="message-row">
            <div class="bot-avatar">🤖</div>
            <div class="msg-wrap">
              <div class="bubble bot">Oops! Something went wrong </div>
            </div>
          </div>`;
      }
    }
    function formatReply(text) {
      return text.replace(/(\d+\.)/g, '<br>$1').replace(/^<br>/, '');
    }
    // TEXT TO SPEECH - ASTA speaks
function speak(text) {
  const clean = text.replace(/[*#]/g, '').replace(/\d+\.\s*/g, '');
  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.rate = 0.95;
  utterance.pitch = 1.1;
  utterance.volume = 1;
  window.speechSynthesis.speak(utterance);
}

// SPEECH TO TEXT - User speaks
let recognition;
let isListening = false;

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Your browser does not support voice input. Please use Chrome!');
    return;
  }

  if (isListening) {
    recognition.stop();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').textContent = '🔴';
    document.getElementById('mic-btn').style.background = 'linear-gradient(135deg, #ff6b6b, #ee0979)';
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    document.getElementById('input').value = transcript;
    sendMessage();
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').textContent = '🎤';
    document.getElementById('mic-btn').style.background = 'linear-gradient(135deg, #ac88e8, #9667e0)';
  };

  recognition.onerror = (event) => {
    isListening = false;
    document.getElementById('mic-btn').textContent = '🎤';
    document.getElementById('mic-btn').style.background = 'linear-gradient(135deg, #ac88e8, #9667e0)';
  };

  recognition.start();
}
  </script>
</body>
</html>
